name: Deploy to Vodien

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/**'
      - '.github/workflows/**'
      - 'robots.txt'
      - 'wp-config.php'
      - '.htaccess'
      - '*.html'
      - '*.php'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy all files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.VODIEN_HOST }}
          username: ${{ secrets.VODIEN_USER }}
          password: ${{ secrets.VODIEN_PASSWORD }}
          local-dir: ./
          server-dir: public_html/ah-ho-fruit/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/docs/**
            **/sql/**
            **/.env
            **/deploy-key*
            **/deploy.sh
            **/*.md
            **/*.yml
            **/*.sh
            **/docker-compose.yml

      - name: Reset OPcache
        run: |
          sleep 3
          echo "Resetting OPcache..."
          RESULT=$(curl -s "https://ahhofruit.com/opcache-reset.php?token=ah_ho_deploy_2026" || echo "failed")
          echo "OPcache reset result: $RESULT"
          # Also hit wp-cron as fallback
          curl -s -o /dev/null "https://ahhofruit.com/wp-cron.php?doing_wp_cron=$(date +%s)"
          sleep 2

      - name: Verify deployment
        run: |
          echo -n "class-pdf-generator.php: "
          curl -sI -o /dev/null -w "%{http_code}" "https://ahhofruit.com/wp-content/plugins/ah-ho-invoicing/includes/class-pdf-generator.php"
          echo ""
